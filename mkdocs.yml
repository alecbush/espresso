site_name: Espresso PHP Router
site_description: A lightweight PHP router for building microservices and APIs
site_author: Alec Bush
site_url: https://alecbush.github.io/espresso/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - Examples:
    - Basic: examples/basic.md
    - Middleware: examples/middleware.md
    - Sub-routing: examples/sub-routing.md
  - API Reference: api.md

plugins:
  - search